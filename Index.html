<!DOCTYPE html>
<html>
<head>
    <title>ShalomBrAIn</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f5f5;
        }

        /* Chat area */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            max-width: 70%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #e0e0e0;
            color: black;
            margin-right: auto;
        }

        /* Input area */
        #inputArea {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ccc;
        }

        textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        img.logo {
            width: 200px;
            display: block;
            margin: 10px auto;
        }
    </style>
</head>

<body>

<img src="/static/logo.jpg" class="logo">

<div id="chat"></div>

<div id="inputArea">
    <textarea id="question" placeholder="Ask ShalomBrAIn..." rows="1"></textarea>
    <button onclick="askQuestion()">⬆️</button>
</div>

<script>
const textarea = document.getElementById("question");

// Auto-expand textarea
textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
});

// Enter to send (Shift+Enter = new line)
textarea.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
    }
});

function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function askQuestion() {
    const questionBox = document.getElementById("question");
    const question = questionBox.value.trim();
    if (!question) return;

    addMessage(question, "user");
    questionBox.value = "";
    questionBox.style.height = "auto";

    addMessage("Thinking...", "bot");

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ question: question })
        });

        const data = await res.json();

        // Replace "Thinking..." with real answer
        const chat = document.getElementById("chat");
        chat.lastChild.innerText = data.answer;

    } catch (error) {
        const chat = document.getElementById("chat");
        chat.lastChild.innerText = "Error: " + error.message;
    }
}
</script>

</body>
</html>
