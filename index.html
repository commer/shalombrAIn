<!DOCTYPE html>
<html>
<head>
    <title>shalombrAIn</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }

        .header {
            width: 100%;
            background: white;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header img {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            display: block;
        }

        .container {
            margin-top: 40px;
        }

        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #response {
            margin-top: 20px;
            font-size: 18px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

    <!-- Header Banner -->
    <div class="header">
        <img src="/static/logo.jpg" alt="shalombrAIn Logo">
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>shalombrAIn</h1>

        <input type="text" id="question" placeholder="Ask a question...">
        <br><br>

        <button onclick="askQuestion()">Ask</button>

        <p id="response"></p>
    </div>

<script>
async function askQuestion() {
    const question = document.getElementById("question").value;
    const responseBox = document.getElementById("response");

    responseBox.innerText = "Thinking...";

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await res.json();
        responseBox.innerText = data.answer;

    } catch (error) {
        responseBox.innerText = "Error: " + error.message;
    }
}
</script>

</body>
</html>
